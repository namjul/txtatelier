name: Deploy PWA to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "centers/pwa/**"
      - ".github/workflows/pwa-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pwa-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build PWA
        working-directory: centers/pwa
        env:
          VITE_TXTATELIER_BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          export VITE_COMMIT_SHA="${GITHUB_SHA:0:7}"
          export VITE_COMMIT_MESSAGE="$(git log -1 --pretty=%s)"
          export VITE_GIT_BRANCH="${GITHUB_REF_NAME}"
          bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: centers/pwa/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
